        function initFloatingWords() {
            const container = document.getElementById('canvas-container');
            const words = PORTFOLIO_DATA.floatingWords;
            const numWords = 35; // Slightly more words

            for (let i = 0; i < numWords; i++) {
                const wordEl = document.createElement('div');
                wordEl.className = 'floating-word';
                wordEl.innerText = words[Math.floor(Math.random() * words.length)];

                // Randomize initial state
                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight;
                const fontSize = 10 + Math.random() * 30; // 10px to 40px
                const depth = Math.random(); // 0 (far) to 1 (near)

                wordEl.style.left = `${startX}px`;
                wordEl.style.top = `${startY}px`;
                wordEl.style.fontSize = `${fontSize}px`;
                wordEl.style.filter = `blur(${(1 - depth) * 3}px)`;

                // Base opacity depends on depth (closer = slightly more visible)
                const baseOpacity = 0.05 + (depth * 0.1);
                wordEl.style.opacity = baseOpacity;
                wordEl.dataset.baseOpacity = baseOpacity;
                wordEl.dataset.depth = depth; // Store for animation

                container.appendChild(wordEl);

                animateWord(wordEl);
            }
        }

        function animateWord(el) {
            const depth = parseFloat(el.dataset.depth);
            // Farther words (low depth) move slower
            const speedFactor = 0.5 + depth;
            const duration = (40 + Math.random() * 60) / speedFactor;

            const moveX = (Math.random() > 0.5 ? 1 : -1) * (100 + Math.random() * 400);
            const moveY = (Math.random() > 0.5 ? 1 : -1) * (50 + Math.random() * 200);
            const rotation = -15 + Math.random() * 30;

            gsap.to(el, {
                x: `+=${moveX}`,
                y: `+=${moveY}`,
                rotation: rotation,
                duration: duration,
                ease: "none",
                onComplete: () => {
                    gsap.to(el, {
                        opacity: 0,
                        duration: 3,
                        onComplete: () => {
                            el.style.left = `${Math.random() * window.innerWidth}px`;
                            el.style.top = `${Math.random() * window.innerHeight}px`;
                            gsap.set(el, { x: 0, y: 0, rotation: 0 });

                            gsap.to(el, {
                                opacity: el.dataset.baseOpacity,
                                duration: 3,
                                onComplete: () => animateWord(el)
                            });
                        }
                    });
                }
            });
        }

        function initScrollAnimations() {
            gsap.registerPlugin(ScrollTrigger);

            // Fade in sections on scroll
            const sections = document.querySelectorAll('section');
            sections.forEach(section => {
                gsap.fromTo(section,
                    { y: 40, opacity: 0 },
                    {
                        y: 0,
                        opacity: 1,
                        duration: 1.2,
                        ease: "power3.out",
                        scrollTrigger: {
                            trigger: section,
                            start: "top 85%",
                        }
                    }
                );
            });

            // Subtle parallax for the floating words container
            gsap.to('#canvas-container', {
                yPercent: 15,
                ease: "none",
                scrollTrigger: {
                    trigger: "body",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1
                }
            });
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            render();
            initFloatingWords();
            initScrollAnimations();

            // Handle window resize for floating words
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const container = document.getElementById('canvas-container');
                    container.innerHTML = '';
                    initFloatingWords();
                }, 500);
            });
        });
    </script>
